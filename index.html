<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
  <title>🦝 浣熊森林 · 寻宝派对</title>
  <!-- 字体与图标 -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #5c3d2e 0%, #8b5e3c 40%, #a47148 100%);
      background-attachment: fixed;
      font-family: 'Quicksand', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
      overflow-x: hidden;
      touch-action: pan-y;
    }

    /* 漂浮树叶 (明亮点缀) */
    .leaf {
      position: absolute;
      color: #f9d56e;
      font-size: 24px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
      animation: floatLeaf 8s infinite ease-in-out;
    }
    .leaf.l2 { top: 20%; right: 8%; color: #ffb347; animation-duration: 10s; }
    .leaf.l3 { bottom: 15%; left: 5%; color: #ffe28c; animation-duration: 12s; }
    @keyframes floatLeaf {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(10deg); }
    }

    /* 星光 (明亮) */
    .sparkle {
      position: absolute;
      color: #ffd966;
      font-size: 18px;
      filter: drop-shadow(0 0 6px #fff1b8);
      pointer-events: none;
      z-index: 1;
      animation: pulse 2.5s infinite alternate;
    }
    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* 主游戏卡 (棕色调+玻璃质感) */
    .game-card {
      position: relative;
      z-index: 30;
      width: 100%;
      max-width: 500px;
      background: rgba(92, 61, 46, 0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 64px;
      padding: 24px 20px 28px;
      box-shadow: 0 30px 45px -8px rgba(40, 25, 15, 0.5),
                  inset 0 0 0 1.5px rgba(255, 215, 150, 0.4);
      border: 1px solid rgba(230, 180, 120, 0.3);
      text-align: center;
    }

    /* 音乐控制按钮 */
    .music-control {
      position: absolute;
      top: 18px;
      right: 22px;
      background: rgba(255, 235, 170, 0.3);
      backdrop-filter: blur(6px);
      width: 44px;
      height: 44px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffe3a4;
      font-size: 1.6rem;
      cursor: pointer;
      border: 1px solid #ebc47f;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
      z-index: 40;
    }
    .music-control:active { transform: scale(0.9); }

    /* 标题区 */
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fbeeca;
      text-shadow: 4px 4px 0 #7b4f2e;
      margin: 8px 0 6px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    h1 i {
      color: #ffdb7c;
      font-size: 2.2rem;
      filter: drop-shadow(0 2px 4px #503a28);
    }

    .score-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #6f452bcc;
      backdrop-filter: blur(8px);
      padding: 12px 22px;
      border-radius: 60px;
      margin: 15px 0 18px;
      border: 1px solid #eebb77;
      box-shadow: inset 0 2px 6px #aa7e58, 0 6px 0 #4d2f1e;
    }
    .score-box, .highscore-box {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffefc0;
      font-weight: 700;
      font-size: 1.3rem;
    }
    .score-box i, .highscore-box i {
      font-size: 1.8rem;
      color: #ffcd7e;
    }

    /* 主角区域——浣熊和宝藏 */
    .raccoon-area {
      background: #825a40a0;
      border-radius: 60px 60px 40px 40px;
      padding: 20px 12px 16px;
      margin: 12px 0 18px;
      backdrop-filter: blur(8px);
      border: 2px solid #eebb77;
      box-shadow: inset 0 0 0 4px #a77b5a, 0 10px 0 #5d3e28;
      position: relative;
    }

    .raccoon-avatar {
      font-size: 5.8rem;
      filter: drop-shadow(0 12px 12px #35281e);
      transition: transform 0.15s;
      display: inline-block;
      cursor: pointer;
    }
    .raccoon-avatar:active { transform: scale(0.9); }

    .treasure-hint {
      background: #f3d9acd0;
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.3rem;
      color: #5a2e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px solid #ffeab5;
      backdrop-filter: blur(5px);
    }
    .treasure-hint i {
      color: #d48f3b;
      font-size: 1.8rem;
    }

    /* 物品网格 (点击收集) */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px 10px;
      margin: 20px 0 16px;
    }

    .item-card {
      background: #9f7b5ab0;
      backdrop-filter: blur(8px);
      aspect-ratio: 1 / 1.1;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 0 #5c3f2c, inset 0 -2px 6px #dbb486;
      border: 2px solid #fcd598;
      transition: all 0.06s;
      cursor: pointer;
      color: #ffefcf;
    }
    .item-card:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #5c3f2c, inset 0 -2px 6px #dbb486;
    }
    .item-card.disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.3);
      box-shadow: 0 4px 0 #5c3f2c;
      transform: translateY(4px);
    }

    .item-emoji {
      font-size: 3.2rem;
      line-height: 1.2;
      filter: drop-shadow(2px 4px 4px #362415);
    }
    .item-name {
      font-weight: 700;
      font-size: 1rem;
      background: #624a34c0;
      padding: 4px 12px;
      border-radius: 30px;
      margin-top: 4px;
      color: #fff3d1;
    }
    .item-score {
      font-size: 0.9rem;
      background: #ffda9e;
      color: #3f2a19;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 3px;
    }

    /* 特殊动作按钮 */
    .action-buttons {
      display: flex;
      gap: 12px;
      margin: 8px 0 10px;
    }
    .action-btn {
      flex: 1;
      background: #eebb77dd;
      border: none;
      padding: 14px 0;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.2rem;
      color: #4a2c1a;
      backdrop-filter: blur(5px);
      box-shadow: 0 7px 0 #9b6e4b, 0 4px 10px #2f1e12;
      border: 1.5px solid #ffddb0;
      cursor: pointer;
      transition: 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .action-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #9b6e4b, 0 4px 10px #2f1e12;
    }
    .action-btn i {
      color: #7b4a1e;
    }

    /* 重置按钮 */
    .reset-btn {
      background: #dbb486c0;
      border: 1.5px solid #ffeac2;
      padding: 12px;
      border-radius: 40px;
      width: 100%;
      font-weight: 600;
      color: #4e2f1b;
      font-size: 1.2rem;
      backdrop-filter: blur(5px);
      box-shadow: 0 5px 0 #7a593e;
      cursor: pointer;
      margin-top: 14px;
      transition: 0.1s;
    }
    .reset-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #7a593e;
    }

    .footer-credit {
      margin-top: 16px;
      color: #ffeecd;
      opacity: 0.8;
      font-weight: 500;
    }

    /* 提示toast */
    .game-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #3e2c1cdd;
      backdrop-filter: blur(12px);
      color: #ffecbf;
      padding: 14px 24px;
      border-radius: 60px;
      font-weight: 600;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      border: 1px solid #f9cf8b;
      font-size: 1.2rem;
      white-space: nowrap;
    }

    @media (max-width: 420px) {
      .game-card { padding: 18px 14px; }
      h1 { font-size: 2rem; }
      .item-emoji { font-size: 2.6rem; }
    }
  </style>
</head>
<body>
  <!-- 背景漂浮物 (明亮色) -->
  <div class="leaf">🍂</div>
  <div class="leaf l2">🍁</div>
  <div class="leaf l3">🌰</div>
  <div class="sparkle" style="top: 10%; left: 5%;">✨</div>
  <div class="sparkle" style="bottom: 20%; right: 8%;">🌟</div>

  <!-- 背景音乐 -->
  <audio id="bgMusic" loop preload="auto">
    <source src="https://cdn.pixabay.com/audio/2022/05/17/audio_55f7e47e29.mp3" type="audio/mpeg">
    <!-- 备选链接 -->
  </audio>
  <!-- 音效 (点击等) -->
  <audio id="pickSound" preload="auto">
    <source src="https://cdn.pixabay.com/audio/2021/08/04/audio_12b6c6f0c1.mp3" type="audio/mpeg">
  </audio>
  <audio id="treasureSound" preload="auto">
    <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c6c8f3f0c7.mp3" type="audio/mpeg">
  </audio>

  <div class="music-control" id="musicToggle">
    <i class="fas fa-music"></i>
  </div>

  <main class="game-card">
    <h1>
      <i class="fas fa-tree"></i>
      浣熊寻宝
      <i class="fas fa-acorn"></i>
    </h1>

    <!-- 分数栏 -->
    <div class="score-panel">
      <div class="score-box">
        <i class="fas fa-star"></i>
        <span id="scoreDisplay">0</span>
      </div>
      <div class="highscore-box">
        <i class="fas fa-crown"></i>
        <span id="highScoreDisplay">0</span>
      </div>
    </div>

    <!-- 浣熊主角区 (可戳) -->
    <div class="raccoon-area">
      <div class="raccoon-avatar" id="raccoonAvatar">
        🦝
      </div>
      <div class="treasure-hint" id="treasureMessage">
        <i class="fas fa-map"></i>
        <span>戳戳浣熊或收集宝贝！</span>
        <i class="fas fa-gem"></i>
      </div>
    </div>

    <!-- 可收集物品网格 (9种明亮小物) -->
    <div class="items-grid" id="itemsGrid"></div>

    <!-- 特殊动作 -->
    <div class="action-buttons">
      <button class="action-btn" id="feedBtn"><i class="fas fa-apple-alt"></i> 喂食</button>
      <button class="action-btn" id="surpriseBtn"><i class="fas fa-gift"></i> 惊喜</button>
    </div>

    <!-- 重置 -->
    <button class="reset-btn" id="resetGameBtn"><i class="fas fa-rotate-left"></i> 重新开始</button>

    <div class="footer-credit">
      🦝 帮小浣熊收集闪闪发光的宝贝吧！
    </div>
  </main>

  <div id="gameToast" class="game-toast">🍎 浣熊开心地晃了晃尾巴</div>

  <script>
    (function(){
      "use strict";

      // ---------- 音频元素 ----------
      const bgMusic = document.getElementById('bgMusic');
      const pickSound = document.getElementById('pickSound');
      const treasureSound = document.getElementById('treasureSound');
      const musicToggle = document.getElementById('musicToggle');
      
      let musicPlaying = false;
      // 音乐控制 (用户手势启动)
      function toggleMusic() {
        if (!musicPlaying) {
          bgMusic.volume = 0.5;
          bgMusic.play().then(() => {
            musicPlaying = true;
            musicToggle.innerHTML = '<i class="fas fa-volume-up"></i>';
          }).catch(e => { /* 自动播放被阻止，等用户交互 */ });
        } else {
          bgMusic.pause();
          musicPlaying = false;
          musicToggle.innerHTML = '<i class="fas fa-music"></i>';
        }
      }
      musicToggle.addEventListener('click', toggleMusic);
      
      // 尝试在首次用户交互时启用音乐 (任何点击)
      function enableMusicOnFirstTouch() {
        if (!musicPlaying) {
          bgMusic.play().then(() => {
            musicPlaying = true;
            musicToggle.innerHTML = '<i class="fas fa-volume-up"></i>';
          }).catch(()=>{});
        }
        document.removeEventListener('click', enableMusicOnFirstTouch);
        document.removeEventListener('touchstart', enableMusicOnFirstTouch);
      }
      document.addEventListener('click', enableMusicOnFirstTouch, { once: true });
      document.addEventListener('touchstart', enableMusicOnFirstTouch, { once: true });

      // 播放音效 (小捡拾)
      function playPickSound() {
        pickSound.currentTime = 0;
        pickSound.volume = 0.7;
        pickSound.play().catch(()=>{});
      }
      function playTreasureSound() {
        treasureSound.currentTime = 0;
        treasureSound.volume = 0.8;
        treasureSound.play().catch(()=>{});
      }

      // ---------- 游戏数据 ----------
      let score = 0;
      let highScore = localStorage.getItem('raccoonHighScore') ? parseInt(localStorage.getItem('raccoonHighScore')) : 0;
      
      // 物品定义 (明亮颜色、棕色主题点缀)
      const itemsData = [
        { emoji: '🍎', name: '红苹果', baseScore: 10, color: '#e63946' },
        { emoji: '🍯', name: '蜂蜜罐', baseScore: 15, color: '#f4a261' },
        { emoji: '🌰', name: '橡果', baseScore: 8, color: '#bc6c25' },
        { emoji: '💎', name: '蓝宝石', baseScore: 30, color: '#48cae4' },
        { emoji: '🍇', name: '野葡萄', baseScore: 12, color: '#9d4edd' },
        { emoji: '🌟', name: '星星', baseScore: 25, color: '#ffb703' },
        { emoji: '🧦', name: '幸运袜', baseScore: 5, color: '#ff9f1c' },
        { emoji: '🍄', name: '蘑菇', baseScore: 7, color: '#e76f51' },
        { emoji: '🔔', name: '小铃铛', baseScore: 20, color: '#e9c46a' }
      ];

      let items = [];
      let collectedState = []; // false=未收集
      const gridEl = document.getElementById('itemsGrid');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const highScoreDisplay = document.getElementById('highScoreDisplay');
      const treasureMessage = document.getElementById('treasureMessage').querySelector('span');
      const gameToast = document.getElementById('gameToast');
      const raccoonAvatar = document.getElementById('raccoonAvatar');

      // 更新UI分数
      function updateScoreUI() {
        scoreDisplay.textContent = score;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('raccoonHighScore', highScore);
        }
        highScoreDisplay.textContent = highScore;
      }

      // 显示toast
      function showToast(msg, emoji = '🦝') {
        gameToast.style.opacity = '1';
        gameToast.textContent = `${emoji} ${msg}`;
        setTimeout(() => gameToast.style.opacity = '0', 1800);
      }

      // 随机增益
      function applyBonusMessage(itemName, baseVal) {
        const bonus = Math.floor(Math.random() * 8) + 2;
        return baseVal + bonus;
      }

      // 收集物品
      function collectItem(index) {
        if (index < 0 || index >= items.length) return;
        if (collectedState[index]) return; // 已收集
        
        const item = items[index];
        let gained = item.baseScore;
        // 随机小惊喜 (20%概率双倍)
        let doubleMsg = '';
        if (Math.random() < 0.2) {
          gained = gained * 2;
          doubleMsg = ' ✨双倍!';
          playTreasureSound();
        } else {
          playPickSound();
        }
        
        score += gained;
        collectedState[index] = true;
        
        // 更新UI卡片样式
        const card = document.querySelector(`.item-card[data-index="${index}"]`);
        if (card) card.classList.add('disabled');
        
        updateScoreUI();
        showToast(`+${gained}  ${item.name}${doubleMsg}`, item.emoji);
        treasureMessage.textContent = `好棒！继续收集～`;
        
        // 检查是否全部收集
        if (collectedState.every(v => v === true)) {
          setTimeout(() => {
            showToast('🎉 太厉害了！所有宝贝集齐啦！ 🎉', '🏆');
            treasureMessage.textContent = '你是浣熊的大英雄！';
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
          }, 300);
        }
      }

      // 渲染网格
      function renderItems() {
        gridEl.innerHTML = '';
        items.forEach((item, idx) => {
          const card = document.createElement('div');
          card.className = `item-card ${collectedState[idx] ? 'disabled' : ''}`;
          card.setAttribute('data-index', idx);
          
          card.innerHTML = `
            <div class="item-emoji">${item.emoji}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-score">+${item.baseScore}</div>
          `;
          
          card.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!collectedState[idx]) {
              collectItem(idx);
            } else {
              showToast('已经收集过啦！', '🤔');
            }
          });
          
          gridEl.appendChild(card);
        });
      }

      // 重置游戏
      function resetGame() {
        score = 0;
        // 重置收集状态
        items = itemsData.map(item => ({ ...item }));
        collectedState = new Array(items.length).fill(false);
        
        renderItems();
        updateScoreUI();
        treasureMessage.textContent = '戳戳浣熊或收集宝贝！';
        showToast('新的一局！帮浣熊找宝贝吧', '🍂');
        // 小彩带
        confetti({ particleCount: 40, spread: 60, origin: { y: 0.5 } });
      }

      // 浣熊互动
      function raccoonInteract() {
        // 随机给一个未收集物品额外加分 (小彩蛋)
        const uncollectedIndices = collectedState.reduce((arr, val, i) => val ? arr : [...arr, i], []);
        if (uncollectedIndices.length > 0) {
          const randomIdx = uncollectedIndices[Math.floor(Math.random() * uncollectedIndices.length)];
          const bonus = 5 + Math.floor(Math.random() * 15);
          score += bonus;
          updateScoreUI();
          playPickSound();
          showToast(`浣熊帮你找到了 +${bonus} 分！`, '🦝✨');
          treasureMessage.textContent = `浣熊蹭了蹭你～`;
        } else {
          // 全收集了就给个鼓励
          score += 5;
          updateScoreUI();
          playTreasureSound();
          showToast('浣熊开心地转圈圈 +5', '🦝💫');
        }
        // 晃动动画
        raccoonAvatar.style.transform = 'scale(1.05)';
        setTimeout(() => raccoonAvatar.style.transform = '', 150);
      }

      // 喂食动作
      function feedRaccoon() {
        const bonus = 12 + Math.floor(Math.random() * 20);
        score += bonus;
        updateScoreUI();
        playPickSound();
        showToast(`浣熊吃了苹果 +${bonus} 分`, '🍎🦝');
        treasureMessage.textContent = '浣熊眼睛亮晶晶 ✨';
        confetti({ particleCount: 20, spread: 45, origin: { y: 0.6 } });
        raccoonAvatar.style.transform = 'scale(1.1)';
        setTimeout(() => raccoonAvatar.style.transform = '', 150);
      }

      // 惊喜按钮
      function surpriseAction() {
        const surpriseBonus = 25;
        score += surpriseBonus;
        updateScoreUI();
        playTreasureSound();
        showToast('🎁 宝箱打开！获得 ' + surpriseBonus + ' 分', '💝');
        treasureMessage.textContent = '哇！金色传说！';
        confetti({ particleCount: 80, spread: 80, origin: { y: 0.5 }, colors: ['#ffd166', '#f4a261', '#e9c46a'] });
        raccoonAvatar.style.transform = 'rotate(5deg) scale(1.08)';
        setTimeout(() => raccoonAvatar.style.transform = '', 200);
        
        // 额外彩蛋：解锁一个随机未收集物品？ 直接送分就好了
      }

      // 初始化事件
      function initGame() {
        // 初始数据
        items = itemsData.map(item => ({ ...item }));
        collectedState = new Array(items.length).fill(false);
        renderItems();
        updateScoreUI();
        
        // 浣熊点击
        raccoonAvatar.addEventListener('click', raccoonInteract);
        
        // 喂食
        document.getElementById('feedBtn').addEventListener('click', feedRaccoon);
        // 惊喜
        document.getElementById('surpriseBtn').addEventListener('click', surpriseAction);
        // 重置
        document.getElementById('resetGameBtn').addEventListener('click', resetGame);
        
        // 加载时检查高分显示
        highScoreDisplay.textContent = highScore;
        treasureMessage.textContent = '戳戳浣熊或收集宝贝！';
      }

      // 彩带简单函数 (借用前面)
      function confetti(options) {
        if (window.confetti) {
          window.confetti(options);
        }
      }

      initGame();
      
      // 双击浣熊隐藏小惊喜
      let clickCount = 0;
      raccoonAvatar.addEventListener('dblclick', () => {
        score += 20;
        updateScoreUI();
        playTreasureSound();
        showToast('🦝💖 浣熊送了你一颗幸运橡果 +20', '🌟');
      });

      // 适配移动端: 阻止默认
      window.addEventListener('touchmove', (e) => {
        if (e.target.closest('.item-card') || e.target.closest('.action-btn')) e.preventDefault();
      }, { passive: false });
      
    })();
  </script>
